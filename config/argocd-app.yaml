apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-argocd-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/20206205Tech/gitops-argocd
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true