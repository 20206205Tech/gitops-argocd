# 1. ConfigMap chứa cấu hình Nginx (Sử dụng biến môi trường OLLAMA_API_KEY)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-nginx-template
data:
  default.conf.template: |
    server {
        listen 80;
        server_name _;

        # Cấu hình kích thước request lớn cho LLM
        client_max_body_size 100M;

        location / {
            # Bắt buộc phải có API KEY
            if ($http_authorization != "Bearer ${OLLAMA_API_KEY}") {
                return 401 "{\"error\": \"Unauthorized: Invalid API Key\"}\n";
            }

            # Proxy vào Ollama nội bộ
            proxy_pass http://127.0.0.1:11434;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
---
# 2. PVC để lưu trữ Model (tránh tải lại gemma2:9b mỗi khi Pod khởi động lại)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# 3. Deployment chứa 3 containers (Ollama, Nginx Proxy, và Auto-puller)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-deployment
  labels:
    app: ollama
spec:
  replicas: 1 # Khuyến cáo để 1 vì model tốn nhiều RAM/GPU
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc
      - name: nginx-template
        configMap:
          name: ollama-nginx-template
      containers:

      # Container 1: Ollama Server (Chạy ngầm ở port 11434)
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

      # Container 2: Nginx Proxy (Chắn cổng 80, kiểm tra API Key)
      - name: nginx-proxy
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-env-secrets
              key: OLLAMA_API_KEY
        volumeMounts:
        - name: nginx-template
          mountPath: /etc/nginx/templates # <--- CHỈ ĐỂ THƯ MỤC NÀY

      # Container 3: Auto Puller (Đợi Ollama lên rồi tự kéo model)
      - name: auto-puller
        image: curlimages/curl:latest
        command: ["sh", "-c"]
        args:
          - |
            echo "Đang chờ Ollama sẵn sàng..."
            while ! curl -s http://127.0.0.1:11434/api/tags > /dev/null; do sleep 5; done
            echo "Bắt đầu gọi API tải model gemma2:9b..."
            curl -X POST http://127.0.0.1:11434/api/pull -d '{"name": "gemma2:9b"}'
            echo "Hoàn tất tải model!"
            sleep infinity # Giữ container sống để k8s không báo lỗi CrashLoop
---
# 4. Service trỏ vào port 80 của Nginx (Không trỏ vào 11434 của Ollama)
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
