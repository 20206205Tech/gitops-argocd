apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: doppler-operator-deployment-manager
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: doppler-operator-deployment-manager-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: doppler-operator-controller-manager
  namespace: doppler-operator-system
roleRef:
  kind: Role
  name: doppler-operator-deployment-manager
  apiGroup: rbac.authorization.k8s.io
