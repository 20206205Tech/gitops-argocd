apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-queue-deployment
  labels:
    app: rabbitmq-queue
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-queue
  template:
    metadata:
      labels:
        app: rabbitmq-queue
    spec:
      containers:
      - name: rabbitmq-queue
        image: rabbitmq:4.0-management
        imagePullPolicy: Always
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "admin"
        - name: RABBITMQ_DEFAULT_PASS
          value: "secret123"
        # Bỏ comment phần dưới này nếu cluster có hỗ trợ StorageClass để lưu data
        # volumeMounts:
        # - name: rabbitmq-queue-data
        #   mountPath: /var/lib/rabbitmq # SỬA: Giữ đúng đường dẫn gốc của container
#       volumes:
#       - name: rabbitmq-queue-data
#         persistentVolumeClaim:
#           claimName: rabbitmq-queue-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-queue
spec:
  selector:
    app: rabbitmq-queue
  ports:
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
    - name: management
      protocol: TCP
      port: 15672
      targetPort: 15672
  type: ClusterIP
